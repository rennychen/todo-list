spring:
  datasource:
    url: jdbc:mysql://localhost:3306/todo_list_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  logging:
    file:
      name: logs/app.log
    level:
      root: info
      com.github.renny.todolist: debug